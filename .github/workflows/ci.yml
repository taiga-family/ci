name: ⚙️ CI
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: taiga-family/ci/actions/setup/variables@67367a61aee4ba80a39e433f0ea82155c0c178bf # main
      - uses: taiga-family/ci/actions/setup/node@67367a61aee4ba80a39e433f0ea82155c0c178bf # main

      - run: |
          if [[ "${{ env.SUPPORT_AUTO_PUSH }}" == "true" ]]; then
              npm run lint -- --fix
              npm run prettier -- --write
          else
              npm run lint
              npm run prettier -- --check
          fi

      - uses: ./actions/auto/push
        with:
          token: ${{ secrets.TAIGA_FAMILY_BOT_PAT }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
