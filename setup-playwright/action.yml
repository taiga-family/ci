name: Action for Playwright
description: Playwright

inputs:
  version:
    description: custom version
    required: true
  deps:
    description: Browsers to install, e.g. "chromium"
    required: false
    default: chromium

runs:
  using: composite
  steps:
    - name: Detect Playwright and Node versions
      id: detect-versions
      shell: bash
      run: |
        VERSION=$(node -p "require('@playwright/test/package.json').version" 2>/dev/null || true)
        NODE_VERSION=$(node -p "process.versions.node.split('.')[0]")

        if [ -z "$VERSION" ]; then
          VERSION="${{ inputs.version }}"
        fi

        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "node-version=$NODE_VERSION" >> "$GITHUB_OUTPUT"

        echo "Detected Playwright version: $VERSION"
        echo "Detected Node version: $NODE_VERSION"

    - name: Restore Playwright cache
      id: playwright-cache
      uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
      with:
        path: ~/.cache/ms-playwright
        key:
          ${{ runner.os }}-${{ runner.arch }}-node-${{ steps.detect-versions.outputs.node-version }}-playwright-${{
          steps.detect-versions.outputs.version }}-${{ inputs.deps }}-only-shell

    - name: Install Playwright system dependencies
      shell: bash
      run: npx playwright install-deps ${{ inputs.deps }}

    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      shell: bash
      run: npx playwright install --only-shell ${{ inputs.deps }}
      env:
        DEBUG: pw:install
        PLAYWRIGHT_SKIP_BROWSER_GC: 1

    - name: Save Playwright cache
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
      with:
        path: ~/.cache/ms-playwright
        key: ${{ steps.playwright-cache.outputs.cache-primary-key }}
