name: Auto-push action
description: Auto-push action

inputs:
  token:
    description: token
    required: true
  name:
    description: commit username
    required: false
    default: taiga-family-bot
  email:
    description: user email
    required: false
    default: 41898282+github-actions[bot]@users.noreply.github.com
  message:
    description: commit message
    required: false
    default: apply changes after linting
  exclude:
    description: newline-separated list of file patterns to unstage before committing
    required: false
    default: |
      terminalOutput
      *.log
      *.tsbuildinfo

runs:
  using: composite
  steps:
    - name: Commit and push
      shell: bash
      run: |

        if [[ "${{ github.base_ref }}" == "" ]]; then
            echo "Auto push doesn't support when base_ref is empty"
            exit 0
        fi

        if [[ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
            echo "Auto push doesn't support from fork"
            exit 0
        fi

        git config --global user.name "${{ inputs.name }}"
        git config --global user.email "${{ inputs.email }}"
        git remote set-url --push origin https://${{ inputs.name }}:${{ inputs.token }}@github.com/${{ github.repository }}

        git fetch origin ${{ github.head_ref }} &> /dev/null
        git checkout ${{ github.head_ref }}
        git add .

        while IFS= read -r pattern; do
            [[ -z "$pattern" ]] && continue
            git ls-files --cached -- "$pattern" | xargs -r git restore --staged
        done <<< "${{ inputs.exclude }}"

        if [[ $(git status --porcelain) ]]; then
            git commit -m "chore: ${{ inputs.message }} [bot]" --no-verify
            git push -u origin ${{ github.head_ref }}
        else
            echo "Nothing to update"
        fi
