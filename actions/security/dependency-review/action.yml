name: Dependency review
description: Dependency review

inputs:
  severity:
    description: severity
    required: false
    default: 'critical'

runs:
  using: composite
  steps:
    - name: Dependency Review
      uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
      with:
        fail-on-severity: ${{ inputs.severity }}
