name: Action for Playwright
description: Playwright

inputs:
  version:
    description: custom version
    required: true
  deps:
    description: Browsers to install, e.g. "chromium"
    required: false
    default: chromium

runs:
  using: composite
  steps:
    - name: Detect Playwright version
      id: detect-pw
      shell: bash
      run: |
        VERSION=$(node -p "require('@playwright/test/package.json').version" 2>/dev/null || true)

        if [ -z "$VERSION" ]; then
          VERSION="${{ inputs.version }}"
        fi

        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Detected Playwright version: $VERSION"

    - name: Restore Playwright cache
      id: playwright-cache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.detect-pw.outputs.version }}-${{ inputs.deps }}

    - name: Install Playwright system dependencies
      shell: bash
      run: npx playwright install-deps ${{ inputs.deps }}

    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      shell: bash
      run: npx playwright install ${{ inputs.deps }}
      env:
        DEBUG: pw:install
        PLAYWRIGHT_SKIP_BROWSER_GC: 1

    - name: Save Playwright cache
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/ms-playwright
        key: ${{ steps.playwright-cache.outputs.cache-primary-key }}
